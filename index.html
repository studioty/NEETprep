<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEETprep</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;

            /* Gradient background */
            background: linear-gradient(to bottom right, #ffffff, #eaf2ff);

            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
        }

        .logo {
            width: 80px;
            margin-bottom: 20px;
        }

        h1 {
            color: #1e3a8a;
            font-size: 64px;
            margin-bottom: 40px;
            font-weight: 700;
        }

        .btn {
            font-family: 'Montserrat', sans-serif;
            background-color: transparent;
            color: #2563eb;

            border: 2px solid #2563eb;
            padding: 14px 32px;
            font-size: 18px;
            border-radius: 10px;

            cursor: pointer;
            text-decoration: none;

            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);

            transition: all 0.3s ease;
        }

        .btn:hover {
            background-color: #2563eb;
            color: white;

            box-shadow: 0 6px 18px rgba(37, 99, 235, 0.3);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Logo (replace src with your own image later) -->
        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png" alt="Logo" class="logo">

        <h1>NEETprep 📚</h1>

        <a href="page2.html" class="btn">Get Started</a>
    </div>

</body>
