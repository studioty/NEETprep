<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NEETprep</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f172a, #020617);
  color: white;
}

/* LANDING */
#landing {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.title {
  font-size: 60px;
  font-weight: bold;
}

.tagline {
  color: #94a3b8;
  margin-bottom: 30px;
}

.upload {
  border: 2px dashed #38bdf8;
  padding: 30px;
  border-radius: 20px;
  cursor: pointer;
  backdrop-filter: blur(10px);
}

input { display: none; }

/* APP */
#app {
  display: none;
  height: 100vh;
  display: flex;
}

/* LEFT PDF */
#pdfContainer {
  width: 50%;
  background: #020617;
  overflow: auto;
  padding: 10px;
}

canvas {
  width: 100%;
  margin-bottom: 10px;
}

/* RIGHT FLASHCARDS */
#flashcards {
  width: 50%;
  padding: 20px;
  overflow-y: auto;
}

.card {
  background: rgba(30,41,59,0.7);
  padding: 20px;
  margin-bottom: 15px;
  border-radius: 15px;
  backdrop-filter: blur(10px);
  cursor: pointer;
}

.answer {
  display: none;
  margin-top: 10px;
  color: #38bdf8;
}

.back {
  position: absolute;
  top: 20px;
  left: 20px;
  cursor: pointer;
  color: #38bdf8;
}
</style>
</head>

<body>

<!-- LANDING -->
<div id="landing">
  <div class="title">NEETprep</div>
  <div class="tagline">Prep smarter, not harder 📚</div>

  <label class="upload">
    Upload PDF
    <input type="file" id="pdfInput" accept="application/pdf">
  </label>
</div>

<!-- APP -->
<div id="app">
  <div class="back" onclick="goBack()">← Back</div>

  <div id="pdfContainer"></div>
  <div id="flashcards"></div>
</div>

<script>
const input = document.getElementById("pdfInput");
const pdfContainer = document.getElementById("pdfContainer");
const flashcardsDiv = document.getElementById("flashcards");

input.addEventListener("change", async function(e) {
  const file = e.target.files[0];
  if (!file) return;

  document.getElementById("landing").style.display = "none";
  document.getElementById("app").style.display = "flex";

  const reader = new FileReader();

  reader.onload = async function() {
    const typedarray = new Uint8Array(this.result);
    const pdf = await pdfjsLib.getDocument(typedarray).promise;

    pdfContainer.innerHTML = "";

    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);

      const viewport = page.getViewport({ scale: 1.2 });
      const canvas = document.createElement("canvas");
      const context = canvas.getContext("2d");

      canvas.height = viewport.height;
      canvas.width = viewport.width;

      await page.render({ canvasContext: context, viewport: viewport }).promise;
      pdfContainer.appendChild(canvas);

      const content = await page.getTextContent();
      const text = content.items.map(item => item.str).join(" ");

      createSmartCards(text);
    }
  };

  reader.readAsArrayBuffer(file);
});

/* SMART FLASHCARDS */
function createSmartCards(text) {
  const sentences = text.split(". ");

  sentences.slice(0, 10).forEach(sentence => {

    // Cloze deletion (Anki style)
    let words = sentence.split(" ");
    if (words.length > 6) {
      let index = Math.floor(words.length / 2);
      let hidden = words[index];
      words[index] = "______";

      let question = words.join(" ");
      let answer = hidden;

      addCard(question, answer);
    }

    // Definition style
    if (sentence.includes(" is ") || sentence.includes(" are ")) {
      let parts = sentence.split(" is ");
      if (parts.length > 1) {
        addCard("What is " + parts[0] + "?", parts[1]);
      }
    }

  });
}

function addCard(q, a) {
  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
    <strong>${q}</strong>
    <div class="answer">${a}</div>
  `;

  card.addEventListener("click", () => {
    const ans = card.querySelector(".answer");
    ans.style.display = ans.style.display === "none" ? "block" : "none";
  });

  flashcardsDiv.appendChild(card);
}

function goBack() {
  document.getElementById("landing").style.display = "flex";
  document.getElementById("app").style.display = "none";
  pdfContainer.innerHTML = "";
  flashcardsDiv.innerHTML = "";
}
</script>

</body>
</html>
